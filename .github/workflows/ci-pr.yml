name: CI - Pull Request

on:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build (compile)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile only (prerequisite for test)
        run: mvn -B -ntp -DskipTests compile

      - name: Upload compiled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maven-target-build
          path: target/
          if-no-files-found: error

  test:
    name: Test (verify)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: maven-target-build
          path: target/

      - name: Run Maven verify
        run: mvn -B -ntp verify

      - name: Answer - can verify run without compiling?
        run: |
          echo "Con el ciclo de vida normal de Maven, verify incluye compile/test-compile en runners limpios." >> $GITHUB_STEP_SUMMARY
          echo "Se puede reducir recompilacion reutilizando artifacts/cache, pero con verify no se evita al 100% en un runner nuevo." >> $GITHUB_STEP_SUMMARY

  analysis:
    name: Analysis (static checks)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Static analysis - Checkstyle report
        run: mvn -B -ntp -DskipTests checkstyle:checkstyle

      - name: Static analysis - PMD report
        run: mvn -B -ntp -DskipTests pmd:pmd

      - name: Publish analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: analysis-reports
          path: target/site/
          if-no-files-found: warn

  deploy:
    name: Deploy (placeholder)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy step (in construction)
        run: echo "En construcción ..."

